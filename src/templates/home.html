{% extends "./base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 mb-3">
    <div class="container-fluid">
        <a class="navbar-brand">Dashboard</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('productos') }}">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('clientes') }}">Clientes</a>
                </li>
            </ul>
            <form class="d-flex align-items-center gap-2" role="search">
                <input class="form-control" type="search" placeholder="Search" aria-label="Search" />
                <button class="btn btn-outline-success" type="submit">Search</button>
                <a class="btn btn-secondary text-nowrap" href="{{ url_for('logout') }}">Cerrar sesión</a>
            </form>
        </div>
    </div>
</nav>
<div class="container text-center">
    <h1 class="display-6 fw-bold">Bienvenido {{ current_user.fullname }}</h1>
</div>



<footer class="footer">
    <div class="container text-center">
        <p class="text-muted">Proyecto Web Python</p>
    </div>
</footer>

{% endblock %}
